     quelle_url: "https://eur-lex.europa.eu/eli/reg/2016/679/oj"}
  - {celex: "32024R1689", titel: "EU AI Act", gueltig_ab: "2026-02-17", domaene: [eu_ai_act],
     quelle_url: "https://eur-lex.europa.eu/eli/reg/2024/1689/oj"}
  - {celex: "32023R2854", titel: "Data Act",  gueltig_ab: "2025-09-12", domaene: [data_act],
     quelle_url: "https://eur-lex.europa.eu/eli/reg/2023/2854/oj"}
  - {celex: "32017R1001", titel: UMV,         gueltig_ab: "2017-10-01", domaene: [markenrecht],
     quelle_url: "https://eur-lex.europa.eu/eli/reg/2017/1001/oj"}
