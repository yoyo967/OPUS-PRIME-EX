# SPEC: CLAUDE.md §5 (CI/CD: lint -> typecheck -> unit -> ingest-fixtures ->
# guardrail-tests -> spec_lint -> eval-smoke)
# Stufen ingest-fixtures / guardrail-tests / eval-smoke werden mit den jeweiligen
# Meilensteinen ergaenzt (P3-Reihenfolge gemaess NEXT_STEPS.md Schritt 3).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install
        run: pip install -e ".[dev,bmf]"
      - name: lint
        run: ruff check .
      - name: typecheck
        run: mypy
      - name: unit
        # SPEC: CLAUDE.md §5 (unit). Alle nicht separat benannten Stufen: Tools,
        # Router/Klassifikation, API-Gateway, Web-Server und der Eval-Harness selbst.
        run: pytest -q tests/tools tests/router tests/gateway tests/web tests/evals
      - name: ingest-fixtures
        # SPEC: CLAUDE.md §4.2, §5 (Pipeline-Stufe ingest-fixtures)
        run: pytest -q tests/rag
      - name: guardrail-tests
        # SPEC: CLAUDE.md §4.3, §5 (adversariale Faelle je Guardrail G1-G8)
        run: pytest -q tests/guardrails tests/orchestrator
      - name: spec_lint
        run: python scripts/spec_lint.py
      - name: eval-smoke
        # SPEC: CLAUDE.md §5 (14-Faelle-Subset auf jedem PR). Modus 'fake' prueft
        # Harness + Guardrails deterministisch; Live-Eval (Modellqualitaet, DoD-Gate
        # >=95 %) folgt mit API-Anbindung nightly (ANTHROPIC_API_KEY als Secret).
        run: python -m evals.harness.run --smoke
